name: mcp-issue-loop hook test

# Deterministic, hermetic test of the proto-learning capture hook.
# No `claude`, no `gh`, no network — just bash + jq, a few seconds.
# Runs on EVERY PR and every push to main (no `paths` filter): the test is
# cheap, and a path filter only reliably matches on the `opened` event, so a PR
# that adds hooks/ changes in a later push can slip through ungated. Running
# unconditionally trades a few wasted seconds on unrelated PRs for a gate that
# never silently skips.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  hook-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run capture-hook tests
        run: bash plugins/mcp-issue-loop/hooks/test/run.sh
